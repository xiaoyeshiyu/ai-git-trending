name: Generate GitHub Trending Report

on:
  schedule:
    # 北京时间 9:00 AM = UTC 1:00 AM
    - cron: '0 1 * * *'
  workflow_dispatch:

concurrency:
  group: report-generation
  cancel-in-progress: false

jobs:
  generate-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run reporter
        working-directory: backend
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL || 'gpt-4-turbo' }}
          GITHUB_API_TOKEN: ${{ secrets.GITHUB_API_TOKEN }}
          LLM_MAX_RETRIES: '3'
          LLM_RETRY_DELAY: '5'
          LLM_TIMEOUT: '60'
          NUM_PROJECTS_TO_SUMMARIZE: ${{ vars.NUM_PROJECTS_TO_SUMMARIZE || '8' }}
          MAX_PROJECTS_TO_SCRAPE: ${{ vars.MAX_PROJECTS_TO_SCRAPE || '25' }}
        run: |
          python app.py --mode reporter --once

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git pull --rebase origin main

          git add output/reporter.db output/md/ output/html/

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            TODAY=$(date +%Y-%m-%d)
            git commit -m "📊 Daily report: $TODAY [skip ci]"
            git push origin main
          fi

      - name: Build Pages site
        run: |
          mkdir -p _pages
          cp -r output/html/*.html _pages/ 2>/dev/null || true

          # Generate reports.json manifest
          reports_json="["
          first=true
          for f in _pages/github_trending_*.html; do
            [ -f "$f" ] || continue
            filename=$(basename "$f")
            date_str=$(echo "$filename" | sed 's/github_trending_//' | sed 's/\.html//')
            display_date=$(date -d "$date_str" "+%Y年%m月%d日" 2>/dev/null || echo "$date_str")
            size_kb=$(( $(stat -c%s "$f" 2>/dev/null || echo 0) / 1024 ))
            if [ "$first" = true ]; then first=false; else reports_json+=","; fi
            reports_json+="{\"date\":\"$date_str\",\"display\":\"$display_date\",\"file\":\"$filename\",\"size\":$size_kb}"
          done
          reports_json+="]"
          echo "$reports_json" > _pages/reports.json

          # Create index.html
          cat > _pages/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>GitHub Trending 日报</title>
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
          <style>
          *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
          :root {
            --bg: #f8f7f4;
            --surface: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #6b6b6b;
            --accent: #1a56db;
            --accent-soft: #e8f0fe;
            --border: #e8e5df;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-hover: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
            --radius: 12px;
          }
          body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
          }
          .hero {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #172554 100%);
            color: #fff;
            padding: 64px 24px 48px;
            text-align: center;
            position: relative;
            overflow: hidden;
          }
          .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 30% 50%, rgba(59,130,246,0.15) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 20%, rgba(139,92,246,0.1) 0%, transparent 50%);
          }
          .hero h1 { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 700; letter-spacing: -0.02em; position: relative; }
          .hero p { font-size: 1.05rem; opacity: 0.75; margin-top: 8px; position: relative; font-weight: 400; }
          .container { max-width: 860px; margin: 0 auto; padding: 32px 20px 64px; }
          .stats-bar {
            display: flex; gap: 24px; flex-wrap: wrap;
            margin-top: -24px; position: relative; z-index: 2;
          }
          .stat-card {
            flex: 1; min-width: 120px; background: var(--surface);
            border-radius: var(--radius); padding: 20px 24px;
            box-shadow: var(--shadow); text-align: center;
            border: 1px solid var(--border);
          }
          .stat-card .num { font-size: 2rem; font-weight: 700; color: var(--accent); line-height: 1.1; }
          .stat-card .label { font-size: 0.85rem; color: var(--text-secondary); margin-top: 4px; }
          .section-title {
            font-size: 1.3rem; font-weight: 700; letter-spacing: -0.01em;
            margin: 40px 0 16px; display: flex; align-items: center; gap: 10px;
          }
          .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
          .report-list { display: flex; flex-direction: column; gap: 10px; }
          .report-card {
            display: flex; align-items: center; gap: 16px;
            padding: 18px 24px; background: var(--surface);
            border-radius: var(--radius); border: 1px solid var(--border);
            box-shadow: var(--shadow); transition: all 0.2s ease;
            text-decoration: none; color: inherit; cursor: pointer;
          }
          .report-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); border-color: #c8d6e5; }
          .report-date { font-weight: 600; font-size: 1.05rem; white-space: nowrap; min-width: 110px; }
          .report-meta { font-size: 0.85rem; color: var(--text-secondary); }
          .report-arrow { margin-left: auto; color: var(--accent); font-weight: 600; font-size: 0.9rem; white-space: nowrap; }
          .empty-state { text-align: center; padding: 48px 20px; color: var(--text-secondary); }
          .footer { text-align: center; padding: 24px; color: var(--text-secondary); font-size: 0.82rem; border-top: 1px solid var(--border); margin-top: 40px; }
          @media (max-width: 540px) {
            .report-card { flex-wrap: wrap; gap: 6px; }
            .report-arrow { margin-left: 0; }
          }
          </style>
          </head>
          <body>
          <div class="hero">
            <h1>GitHub Trending 日报</h1>
            <p>AI 驱动的技术趋势洞察 · 每日自动更新</p>
          </div>
          <div class="container">
            <div class="stats-bar">
              <div class="stat-card"><div class="num" id="total-count">—</div><div class="label">报告总数</div></div>
              <div class="stat-card"><div class="num" id="latest-date">—</div><div class="label">最新报告</div></div>
              <div class="stat-card"><div class="num" id="latest-size">—</div><div class="label">最新大小 (KB)</div></div>
            </div>
            <div class="section-title">所有报告</div>
            <div class="report-list" id="report-list"></div>
            <div class="empty-state" id="empty-state" style="display:none">
              <p>暂无报告，等待首次生成…</p>
            </div>
          </div>
          <div class="footer">
            Powered by GitHub Actions · Reports generated daily
          </div>
          <script>
          fetch('reports.json')
            .then(r => r.json())
            .then(reports => {
              const list = document.getElementById('report-list');
              const empty = document.getElementById('empty-state');
              if (!reports.length) { empty.style.display = 'block'; return; }
              reports.sort((a, b) => b.date.localeCompare(a.date));
              document.getElementById('total-count').textContent = reports.length;
              document.getElementById('latest-date').textContent = reports[0].display;
              document.getElementById('latest-size').textContent = reports[0].size;
              reports.forEach(r => {
                const a = document.createElement('a');
                a.className = 'report-card';
                a.href = r.file;
                a.innerHTML = `<span class="report-date">${r.display}</span><span class="report-meta">${r.file}</span><span class="report-arrow">查看 →</span>`;
                list.appendChild(a);
              });
            })
            .catch(() => {
              document.getElementById('empty-state').style.display = 'block';
            });
          </script>
          </body>
          </html>
          HTMLEOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_pages

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
